<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강아지 미용실 통합 스케줄러</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">

        <!-- Calendar View -->
        <div id="calendar-view">
            <div class="flex justify-between items-center mb-4">
                <button id="prev-month" class="px-4 py-2 bg-gray-300 rounded">이전 달</button>
                <h2 id="calendar-title" class="text-2xl font-bold text-center"></h2>
                <button id="next-month" class="px-4 py-2 bg-gray-300 rounded">다음 달</button>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center bg-white p-2 rounded-lg shadow"></div>
        </div>

        <!-- Weekly Scheduler View -->
        <div id="scheduler-view" class="hidden">
            <div class="flex justify-between items-center mb-4">
                 <button id="back-to-calendar" class="px-4 py-2 bg-gray-300 rounded">달력으로 돌아가기</button>
                 <h2 id="scheduler-title" class="text-2xl font-bold text-center"></h2>
                 <div></div>
            </div>
            <div id="schedule-grid" class="grid text-center">
                <!-- Schedule grid will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-11/12 md:w-1/3">
            <h2 class="text-xl font-bold mb-4">예약 정보 입력</h2>
            <form id="booking-form">
                <input type="hidden" id="modal-cell-id">
                <div class="mb-4">
                    <label for="dog-name" class="block text-sm font-medium text-gray-700">강아지 이름</label>
                    <input type="text" id="dog-name" name="dog-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                </div>
                <div class="mb-4">
                    <label for="owner-name" class="block text-sm font-medium text-gray-700">보호자 이름</label>
                    <input type="text" id="owner-name" name="owner-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div class="mb-4">
                    <label for="phone-number" class="block text-sm font-medium text-gray-700">전화번호</label>
                    <input type="text" id="phone-number" name="phone-number" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div class="mb-4">
                    <label for="details" class="block text-sm font-medium text-gray-700">상세 내용</label>
                    <textarea id="details" name="details" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">배경 색상</label>
                    <div id="color-picker" class="mt-2 flex space-x-3"></div>
                </div>
                <div class="flex justify-between items-center">
                    <button type="button" id="delete-booking" class="rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">삭제</button>
                    <div>
                        <button type="button" id="close-modal" class="mr-2 rounded-md bg-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-400">취소</button>
                        <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">저장</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
